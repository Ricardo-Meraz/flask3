<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predicción de Precio de Laptop</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            margin-top: 12px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #22c55e;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        #resultado {
            margin-top: 25px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #facc15;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            overflow: hidden;
            border-radius: 10px;
        }

        th, td {
            padding: 12px;
            text-align: center;
            background: rgba(255,255,255,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        th {
            background: rgba(0,0,0,0.35);
        }

        .nota {
            font-size: 14px;
            color: #dbeafe;
            text-align: center;
        }

        @media (max-width: 800px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script>
        function predecirPrecio(event) {
            event.preventDefault();

            const formData = new FormData(document.getElementById("formulario"));

            fetch("/predict", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById("resultado").innerText = data.error;
                } else {
                    document.getElementById("resultado").innerText =
                        "Precio estimado: $" + data.precio;
                }
            });
        }
    </script>
</head>

<body>
    <div class="container">

        <div class="card">
            <h1>Predicción de Precio de Laptop</h1>

            <form id="formulario" onsubmit="predecirPrecio(event)">

                <label>Marca:</label>
                <select name="brand" required>
                    <option value="0">Acer</option>
                    <option value="1">Asus</option>
                    <option value="2">Dell</option>
                    <option value="3">HP</option>
                    <option value="4">Lenovo</option>
                </select>

                <label>Velocidad del Procesador (GHz):</label>
                <input type="number" step="any" name="processor_speed" placeholder="Ejemplo: 3.8" required>

                <label>RAM (GB):</label>
                <input type="number" step="any" name="ram_size" placeholder="Ejemplo: 16" required>

                <label>Almacenamiento (GB):</label>
                <input type="number" step="any" name="storage_capacity" placeholder="Ejemplo: 512" required>

                <label>Tamaño de Pantalla:</label>
                <input type="number" step="any" name="screen_size" placeholder="Ejemplo: 15.6" required>

                <label>Peso (kg):</label>
                <input type="number" step="any" name="weight" placeholder="Ejemplo: 2.6" required>

                <button type="submit">Predecir Precio</button>
            </form>

            <div id="resultado"></div>
        </div>

        <div class="card">
            <h1>Tabla de Marcas</h1>

            <p class="nota">Estos son los valores numéricos usados por el modelo.</p>

            <table>
                <tr>
                    <th>Número</th>
                    <th>Marca</th>
                </tr>
                <tr>
                    <td>0</td>
                    <td>Acer</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Asus</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Dell</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>HP</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Lenovo</td>
                </tr>
            </table>
        </div>

    </div>
</body>
</html>
